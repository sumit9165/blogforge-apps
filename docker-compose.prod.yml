# ============================================================
# BlogForge — docker-compose.prod.yml
# Production: built images, no source mounts, Nginx frontend
# Usage: docker-compose -f docker-compose.prod.yml up -d
# ============================================================

version: "3.9"

services:

  # ── MySQL 8.0 ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: blogforge-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME:-blogforge}
      MYSQL_USER:          ${DB_USER:-blogforge}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - blogforge-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: blogforge-api
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DB_HOST:   db
      DB_PORT:   3306
      NODE_ENV:  production
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - blogforge-internal
      - blogforge-public
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (Nginx static) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
        VITE_APP_NAME: BlogForge
    container_name: blogforge-web
    restart: always
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - blogforge-public

  # ── Reverse Proxy (Nginx) ─────────────────────────────────────
  proxy:
    image: nginx:1.25-alpine
    container_name: blogforge-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - blogforge-public

# ── Volumes ───────────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local
  nginx-cache:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  blogforge-internal:   # DB ↔ Backend only (not exposed)
    driver: bridge
    internal: true
  blogforge-public:     # Frontend + Backend ↔ Proxy
    driver: bridge
