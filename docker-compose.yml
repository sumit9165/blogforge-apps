# ============================================================
# BlogForge — docker-compose.yml
# Development: hot-reload for both frontend and backend
# Usage: docker-compose up
# ============================================================

version: "3.9"

services:

  # ── MySQL / MariaDB Database ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: blogforge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-blogforge_root_pass}
      MYSQL_DATABASE:      ${DB_NAME:-blogforge}
      MYSQL_USER:          ${DB_USER:-blogforge}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-blogforge_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - blogforge-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_PASSWORD:-blogforge_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: blogforge-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - blogforge-net
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (dev mode with Vite HMR) ────────────────────────
  frontend:
    image: node:20-alpine
    container_name: blogforge-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blogforge-net

# ── Named Volumes ─────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────
networks:
  blogforge-net:
    driver: bridge
